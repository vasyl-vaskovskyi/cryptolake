database:
  url: "postgresql://cryptolake:postgres@postgres:5432/cryptolake"

exchanges:
  binance:
    enabled: true
    market: "usdm_futures"
    ws_base: "wss://fstream.binance.com"
    rest_base: "https://fapi.binance.com"
    symbols:
      - btcusdt
    streams:
      trades: true
      depth: true
      bookticker: true
      funding_rate: true
      liquidations: true
      open_interest: true
    depth:
      update_speed: "100ms"
      snapshot_interval: "30s"
      snapshot_overrides: {}
    open_interest:
      poll_interval: "30s"
    collector_id: "binance-collector-test"

redpanda:
  brokers:
    - "redpanda:9092"
  retention_hours: 48

writer:
  rotation: "hourly"
  compression: "zstd"
  compression_level: 3
  checksum: "sha256"
  flush_messages: 100
  flush_interval_seconds: 10

monitoring:
  prometheus_port: 8000
  alerting:
    webhook_url: ""
    rules:
      gap_detected: "critical"
      connection_lost: "critical"
      writer_lag_seconds: 30
      disk_usage_pct: 85
