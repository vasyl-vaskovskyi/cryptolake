database:
  url: "postgresql://cryptolake:postgres@postgres:5432/cryptolake"

exchanges:
  binance:
    enabled: true
    market: "usdm_futures"
    ws_base: "wss://fstream.binance.com"
    rest_base: "https://fapi.binance.com"
    symbols:
      - btcusdt
    streams:
      trades: true
      depth: true
      bookticker: true
      funding_rate: true
      liquidations: true
      open_interest: true
    depth:
      update_speed: "100ms"
      snapshot_interval: "30s"
      snapshot_overrides: {}
    open_interest:
      poll_interval: "30s"
    collector_id: "binance-collector-test"

redpanda:
  brokers:
    - "redpanda:9092"
  retention_hours: 48
  producer:
    max_buffer: 100000
    buffer_caps:
      depth: 2000
      trades: 2000
    default_stream_cap: 2000

writer:
  rotation: "hourly"
  compression: "zstd"
  compression_level: 3
  checksum: "sha256"
  flush_messages: 100
  flush_interval_seconds: 10
  gap_filter:
    # 120s absorbs failover-flap windows during chaos test 9 (primary
    # isolated while backup runs). When failover deactivates transiently,
    # backup_global stops advancing on the writer side; a longer grace
    # gives time for re-activation + backup re-drain before the sweep
    # declares a gap "not covered" and writes it to archive.
    grace_period_seconds: 120

monitoring:
  prometheus_port: 8000
  webhook_url: ""
