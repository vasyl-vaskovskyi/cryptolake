# Dashboard provider — tells Grafana to load every JSON file under
# /var/lib/grafana/dashboards (mounted from infra/grafana/dashboards) and
# hot-reload them when they change. This is how cryptolake-overview.json
# becomes the home dashboard at startup.
apiVersion: 1

providers:
  - name: cryptolake
    orgId: 1
    folder: ""
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
