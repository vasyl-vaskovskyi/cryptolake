# CryptoLake Health Dashboard — System-wide metrics (no exchange/coin filters)
# Run: sampler -c infra/sampler/sampler-health.yml
#
# Grid: 80 cols x 24 rows
# Row 1 (0-13):  [System Resources 0-26] [Commit Failures 27-53] [Data Integrity + Failover 54-80]
# Row 2 (14-24): [Net KB/s 0-26]         [Write KB/s 27-53]      [Failover Records 54-80]

barcharts:
  - title: System Resources
    position: [[0, 0], [27, 14]]
    rate-ms: 5000
    scale: 0
    items:
      - label: CPU
        sample: |
            CORES=$(sysctl -n hw.ncpu); ps -A -o %cpu | awk -v c="$CORES" '{s+=$1} END {v=s/c; if(v>100)v=100; printf "%.0f\n", v}'
      - label: MEM
        sample: |
            vm_stat | awk '/Pages active/{a=$3}/Pages wired/{w=$4}/Pages occupied/{o=$5}/page size/{p=$8}END{gsub(/\./,"",a);gsub(/\./,"",w);gsub(/\./,"",o);used=(a+w+o)*p;total='"$(sysctl -n hw.memsize)"';printf "%.0f\n",used/total*100}'
      - label: DISK
        sample: |
            curl -sg 'http://localhost:9090/api/v1/query?query=writer_disk_usage_pct' | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'
      - label: CONN
        sample: |
            curl -sg 'http://localhost:9090/api/v1/query?query=sum(collector_ws_connections_active)' | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'
      - label: BKUP
        sample: |
            curl -sg 'http://localhost:9090/api/v1/query?query=up{job="collector-backup"}' | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'

sparklines:
  - title: Net KB/s
    position: [[0, 14], [27, 10]]
    rate-ms: 5000
    sample: |
        B=$(netstat -ib | awk '/en0.*<Link/{print $7+$10; exit}'); if [ -f /tmp/.sampler_net_prev ]; then PREV=$(cat /tmp/.sampler_net_prev); echo "$B" > /tmp/.sampler_net_prev; printf "%.0f" $(( (B - PREV) / 5 / 1024 )); else echo "$B" > /tmp/.sampler_net_prev; echo 0; fi

  - title: Write KB/s
    position: [[27, 14], [27, 10]]
    rate-ms: 5000
    sample: |
        curl -sg 'http://localhost:9090/api/v1/query?query=sum(rate(writer_bytes_written_total[5m]))/1024' | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.1f'

  - title: Failover Records /h
    position: [[54, 14], [26, 10]]
    rate-ms: 10000
    sample: |
        curl -sg 'http://localhost:9090/api/v1/query?query=sum(increase(writer_failover_records_total[1h]))' | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'

textboxes:
  - title: Commit Failures /12h
    position: [[27, 0], [27, 14]]
    rate-ms: 30000
    sample: |
        P="http://localhost:9090/api/v1/query?query="; q() { curl -sg "${P}$1" | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'; }; KAFKA=$(q "sum(increase(writer_kafka_commit_failures_total[12h]))"); DBFAIL=$(q "sum(increase(writer_pg_commit_failures_total[12h]))"); BFILL=$(q "backfill_runs_total"); printf "\n %-18s %5s\n\n %s\n\n %-18s %5s\n\n %s\n\n %-18s %5s" "Kafka Commit Fail" "$KAFKA" "─────────────────────────" "DB Commit Fail" "$DBFAIL" "─────────────────────────" "Backfill Runs" "$BFILL"

  - title: Data Integrity
    position: [[54, 0], [26, 7]]
    rate-ms: 30000
    sample: |
        P="http://localhost:9090/api/v1/query?query="; q() { curl -sg "${P}$1" | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'; }; SGAPS=$(q "sum(increase(writer_session_gaps_detected_total[12h]))"); GRECS=$(q "sum(increase(writer_gap_records_written_total[12h]))"); SEALED=$(q "min(writer_hours_sealed_previous_day)"); printf "\n %-18s %3s\n %-18s %3s\n %-18s %3s" "Session Gaps /12h" "$SGAPS" "Gap Records /12h" "$GRECS" "Hours Sealed Yest." "$SEALED"

  - title: Failover Status
    position: [[54, 7], [26, 7]]
    rate-ms: 10000
    sample: |
        P="http://localhost:9090/api/v1/query?query="; q() { curl -sg "${P}$1" | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'; }; ACT=$(q "writer_failover_active"); TOT=$(q "sum(increase(writer_failover_total[12h]))"); RECS=$(q "sum(increase(writer_failover_records_total[12h]))"); SB=$(q "sum(increase(writer_switchback_total[12h]))"); printf "\n %-18s %3s\n %-18s %3s\n %-18s %3s\n %-18s %3s" "Active Now" "$ACT" "Failovers /12h" "$TOT" "Backup Recs /12h" "$RECS" "Switchbacks /12h" "$SB"
