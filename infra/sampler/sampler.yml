# CryptoLake Terminal Dashboard
# Run: sampler -c infra/sampler/sampler.yml
# Requires: curl, jq, prometheus on localhost:9090
#
# Optional filters (env vars):
#   EXCHANGE  — filter by exchange (e.g. binance, coinbase). Default: all.
#   SYMBOL    — filter by trading pair (e.g. BTCUSDT, ETH.*). Default: all.
#
# Examples:
#   sampler -c infra/sampler/sampler.yml                          # all data
#   EXCHANGE=binance sampler -c infra/sampler/sampler.yml         # binance only
#   EXCHANGE=binance SYMBOL=BTCUSDT sampler -c ...                # binance BTC only
#   SYMBOL="BTC.*" sampler -c ...                                 # BTC pairs, all exchanges
#
# Note: Disk Usage is global (no labels). Consumer lag, connections, reconnects,
# and commit failures are exchange-level only (no symbol dimension in these metrics).

barcharts:
  - title: System Resources %
    position: [[0, 8], [20, 12]]
    rate-ms: 5000
    scale: 0
    items:
      - label: CPU
        sample: |
            CORES=$(sysctl -n hw.ncpu); ps -A -o %cpu | awk -v c="$CORES" '{s+=$1} END {v=s/c; if(v>100)v=100; printf "%.0f\n", v}'
      - label: MEM
        sample: |
            vm_stat | awk '/Pages active/{a=$3}/Pages wired/{w=$4}/Pages occupied/{o=$5}/page size/{p=$8}END{gsub(/\./,"",a);gsub(/\./,"",w);gsub(/\./,"",o);used=(a+w+o)*p;total='"$(sysctl -n hw.memsize)"';printf "%.0f\n",used/total*100}'
      - label: DISK
        sample: |
            curl -sg 'http://localhost:9090/api/v1/query?query=writer_disk_usage_pct' | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'

sparklines:
# ── Tier 1: Critical ──────────────────────────────────────────────

  - title: Redpanda -> Writer Lag
    position: [[40, 8], [20, 12]]
    rate-ms: 5000
    sample: |
        curl -sg "http://localhost:9090/api/v1/query?query=max(writer_consumer_lag{exchange=~\"${EXCHANGE:-.*}\"})" | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'

  - title: Hours Sealed Today
    position: [[0, 20], [20, 8]]
    rate-ms: 60000
    sample: |
        curl -sg "http://localhost:9090/api/v1/query?query=min(writer_hours_sealed_today{exchange=~\"${EXCHANGE:-.*}\",symbol=~\"${SYMBOL:-.*}\"})" | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'

# ── Tier 2: High ──────────────────────────────────────────────────

  - title: Message Throughput msg/s
    position: [[40, 0], [20, 8]]
    rate-ms: 5000
    sample: |
        curl -sg "http://localhost:9090/api/v1/query?query=sum(rate(collector_messages_produced_total{exchange=~\"${EXCHANGE:-.*}\",symbol=~\"${SYMBOL:-.*}\"}[5m]))" | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.1f'

  - title: Latency p99 ms
    position: [[40, 32], [20, 8]]
    rate-ms: 5000
    sample: |
        curl -sg "http://localhost:9090/api/v1/query?query=histogram_quantile(0.99,sum+by(le)(rate(collector_exchange_latency_ms_bucket{exchange=~\"${EXCHANGE:-.*}\",symbol=~\"${SYMBOL:-.*}\"}[15m])))" | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'

  - title: Snapshots Taken /12h
    position: [[60, 8], [20, 12]]
    rate-ms: 30000
    sample: |
        curl -sg "http://localhost:9090/api/v1/query?query=sum(increase(collector_snapshots_taken_total{exchange=~\"${EXCHANGE:-.*}\",symbol=~\"${SYMBOL:-.*}\"}[12h]))" | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'

# ── Tier 3: Operational ──────────────────────────────────────────

  - title: Net KB/s
    position: [[0, 32], [20, 8]]
    rate-ms: 5000
    sample: |
        B=$(netstat -ib | awk '/en0.*<Link/{print $7+$10; exit}'); if [ -f /tmp/.sampler_net_prev ]; then PREV=$(cat /tmp/.sampler_net_prev); echo "$B" > /tmp/.sampler_net_prev; printf "%.0f" $(( (B - PREV) / 5 / 1024 )); else echo "$B" > /tmp/.sampler_net_prev; echo 0; fi

  - title: Compression Ratio
    position: [[20, 32], [20, 4]]
    rate-ms: 10000
    sample: |
        curl -sg "http://localhost:9090/api/v1/query?query=avg(writer_compression_ratio{exchange=~\"${EXCHANGE:-.*}\",symbol=~\"${SYMBOL:-.*}\"})" | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.2f'

  - title: Flush Duration p99 ms
    position: [[60, 0], [20, 8]]
    rate-ms: 10000
    sample: |
        curl -sg "http://localhost:9090/api/v1/query?query=histogram_quantile(0.99,sum+by(le)(rate(writer_flush_duration_ms_bucket{exchange=~\"${EXCHANGE:-.*}\",symbol=~\"${SYMBOL:-.*}\"}[15m])))" | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'

textboxes:
  - title: Health Counters /12h
    position: [[20, 8], [40, 20]]
    rate-ms: 30000
    sample: |
        P="http://localhost:9090/api/v1/query?query="; E="exchange=~\"${EXCHANGE:-.*}\""; S="symbol=~\"${SYMBOL:-.*}\""; q() { curl -sg "${P}$1" | jq '.data.result[0].value[1] // "0"' -r | xargs printf '%.0f'; }; GAPS=$(q "sum(increase(collector_gaps_detected_total{${E},${S}}[12h]))"); DROPPED=$(q "sum(increase(collector_messages_dropped_total{${E},${S}}[12h]))"); KAFKA=$(q "sum(increase(writer_kafka_commit_failures_total[12h]))"); RECON=$(q "sum(increase(collector_ws_reconnects_total{${E}}[12h]))"); SFAIL=$(q "sum(increase(collector_snapshots_failed_total{${E},${S}}[12h]))"); CONN=$(q "sum(collector_ws_connections_active{${E}})"); WERR=$(q "sum(increase(writer_write_errors_total{${E},${S}}[12h]))"); DBFAIL=$(q "sum(increase(writer_pg_commit_failures_total[12h]))"); BFILL=$(q "backfill_runs_total"); printf "%-22s %6s\n%-22s %6s\n%-22s %6s\n%-22s %6s\n%-22s %6s\n%-22s %6s\n%-22s %6s\n%-22s %6s\n%-22s %6s" "Gaps Detected" "$GAPS" "Messages Dropped" "$DROPPED" "Kafka Commit Fail" "$KAFKA" "Reconnects" "$RECON" "Snapshots Failed" "$SFAIL" "Active Connections" "$CONN" "Write Errors" "$WERR" "DB Commit Fail" "$DBFAIL" "Backfill Runs" "$BFILL"
