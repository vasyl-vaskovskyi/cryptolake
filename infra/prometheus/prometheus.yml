global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: collector
    static_configs:
      - targets: ["collector:8000"]

  - job_name: writer
    static_configs:
      # Writer's HealthServer binds to 8000 inside the container; 8001 is
      # the host-published port. Inside the docker network we use the
      # container-internal port.
      - targets: ["writer:8000"]

  - job_name: backfill
    static_configs:
      # Backfill's HealthServer is wired in BackfillScheduler.run() (see commit
      # 77e1f5c — "feat(backfill): expose /metrics via HealthServer"). Default
      # port 8000 inside the container, published as 8002 on the host.
      # Same gotcha as writer — service-discovery uses container-internal ports.
      - targets: ["backfill:8000"]

  - job_name: consolidation
    static_configs:
      - targets: ["consolidation:8003"]

  - job_name: collector-backup
    static_configs:
      - targets: ["collector-backup:8000"]

  - job_name: redpanda
    static_configs:
      - targets: ["redpanda:9644"]
