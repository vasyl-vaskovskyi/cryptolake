groups:
  - name: cryptolake
    rules:
      - alert: GapDetected
        expr: sum(increase(collector_gaps_detected_total[5m])) > 0
        labels:
          severity: critical
        annotations:
          summary: Gap records detected in the collector stream
          description: Collector emitted at least one gap envelope in the last 5 minutes.

      - alert: ConnectionLost
        expr: sum(collector_ws_connections_active) < 2
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: Collector WebSocket connectivity degraded
          description: Active Binance WebSocket connections fell below the expected count.

      - alert: WriterLagging
        expr: max(writer_consumer_lag) > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Writer consumer lag is elevated
          description: Writer lag exceeded 1,000 messages for more than 2 minutes.

      - alert: WriterLagCritical
        expr: max(writer_consumer_lag) > 100000
        labels:
          severity: critical
        annotations:
          summary: Writer consumer lag is critical
          description: Writer lag exceeded 100,000 messages.

      - alert: SnapshotsFailing
        expr: sum(increase(collector_snapshots_failed_total[15m])) >= 3
        labels:
          severity: warning
        annotations:
          summary: Snapshot fetches are failing repeatedly
          description: At least three snapshot attempts failed in the last 15 minutes.

      - alert: DiskAlmostFull
        expr: writer_disk_usage_pct > 85
        labels:
          severity: warning
        annotations:
          summary: Writer disk usage is high
          description: Writer storage usage exceeded 85%.

      - alert: DiskCritical
        expr: writer_disk_usage_pct > 95
        labels:
          severity: critical
        annotations:
          summary: Writer disk usage is critical
          description: Writer storage usage exceeded 95%.

      - alert: HighLatency
        expr: histogram_quantile(0.99, sum by (le) (rate(collector_exchange_latency_ms_bucket[5m]))) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Exchange latency p99 is elevated
          description: Collector exchange latency p99 exceeded 500ms for 5 minutes.

      - alert: NTPDrift
        expr: collector_ntp_drift_ms > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Collector clock drift is elevated
          description: Estimated NTP drift is above 500ms.

      - alert: RedpandaBufferHigh
        expr: collector_producer_buffer_size > 80000
        labels:
          severity: warning
        annotations:
          summary: Producer buffer is nearing overflow
          description: Collector in-memory producer buffer exceeded 80,000 messages.

      - alert: MessagesDropped
        expr: sum(increase(collector_messages_dropped_total[5m])) > 0
        labels:
          severity: critical
        annotations:
          summary: Collector dropped messages
          description: At least one message was dropped due to producer backpressure.
