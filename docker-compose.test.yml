name: cryptolake-test

services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres
    networks:
      - cryptolake_internal

  redpanda:
    extends:
      file: docker-compose.yml
      service: redpanda
    networks:
      - cryptolake_internal

  collector:
    extends:
      file: docker-compose.yml
      service: collector
    networks:
      - cryptolake_internal
      - collector_egress
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/config/config.test.yaml
      - DATABASE__URL=postgresql://cryptolake:${POSTGRES_PASSWORD:-postgres}@postgres:5432/cryptolake
      - MONITORING__ALERTING__WEBHOOK_URL=${WEBHOOK_URL:-}
      - TEST_DURATION_SECONDS=${TEST_DURATION_SECONDS:-600}
    command:
      - sh
      - -c
      - timeout "$${TEST_DURATION_SECONDS}" /app/.venv/bin/python -m src.collector.main
    restart: "no"

  writer:
    extends:
      file: docker-compose.yml
      service: writer
    networks:
      - cryptolake_internal
    volumes:
      - ./config:/app/config:ro
      - data_volume:${HOST_DATA_DIR:-/data}
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/config/config.test.yaml
      - DATABASE__URL=postgresql://cryptolake:${POSTGRES_PASSWORD:-postgres}@postgres:5432/cryptolake
      - MONITORING__ALERTING__WEBHOOK_URL=${WEBHOOK_URL:-}
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/data}
      - TEST_DURATION_SECONDS=${TEST_DURATION_SECONDS:-600}
    command:
      - sh
      - -c
      - timeout "$${TEST_DURATION_SECONDS}" /app/.venv/bin/python -m src.writer.main
    restart: "no"

  prometheus:
    extends:
      file: docker-compose.yml
      service: prometheus
    networks:
      - cryptolake_internal

  grafana:
    extends:
      file: docker-compose.yml
      service: grafana
    networks:
      - cryptolake_internal

  alertmanager:
    extends:
      file: docker-compose.yml
      service: alertmanager
    networks:
      - cryptolake_internal
      - alertmanager_egress

volumes:
  postgres_data:
  redpanda_data:
  prometheus_data:
  data_volume:

networks:
  cryptolake_internal:
    driver: bridge
    internal: true
  host_access:
    driver: bridge
  collector_egress:
    driver: bridge
  alertmanager_egress:
    driver: bridge
