name: cryptolake

# Java stack. The Python implementation was retired after the Python-to-Java
# port reached DONE state — see git tags `port-{common,writer,collector,cli}-accepted`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=cryptolake
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=cryptolake
    networks:
      - cryptolake_internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptolake -d cryptolake"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.1.2
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:9092
      - --set
      - redpanda.auto_create_topics_enabled=true
      - --set
      - redpanda.log_retention_ms=172800000
      - --set
      - redpanda.default_topic_partitions=1
    ports:
      - "127.0.0.1:9092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cryptolake_internal
      - host_access
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  collector:
    build:
      context: ./cryptolake-java
      dockerfile: docker/Dockerfile.collector
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - cryptolake_internal
      - collector_egress
    volumes:
      - ./config/config.yaml:/etc/cryptolake/config.yml:ro
    environment:
      - LOG_LEVEL=INFO
      - DATABASE__URL=jdbc:postgresql://postgres:5432/cryptolake?user=cryptolake&password=${POSTGRES_PASSWORD:-postgres}
      - MONITORING__WEBHOOK_URL=${WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Backup collector requires a Java-side env-var override of topicPrefix +
  # collectorId (currently both are sourced from config.yaml only). Re-enable
  # this service once that small Main.java change lands. Tracking note in
  # docs/superpowers/port/POST_PORT_FOLLOWUPS.md (if/when written).
  #
  # collector-backup:
  #   build:
  #     context: ./cryptolake-java
  #     dockerfile: docker/Dockerfile.collector
  #   depends_on:
  #     redpanda:
  #       condition: service_healthy
  #   ports:
  #     - "127.0.0.1:8004:8000"
  #   networks:
  #     - cryptolake_internal
  #     - backup_egress
  #   volumes:
  #     - ./config/config.yaml:/etc/cryptolake/config.yml:ro
  #   environment:
  #     - LOG_LEVEL=INFO
  #     - DATABASE__URL=jdbc:postgresql://postgres:5432/cryptolake?user=cryptolake&password=${POSTGRES_PASSWORD:-postgres}
  #     - MONITORING__WEBHOOK_URL=${WEBHOOK_URL:-}
  #     - COLLECTOR_ID=binance-collector-backup
  #     - TOPIC_PREFIX=backup.
  #   restart: unless-stopped

  writer:
    build:
      context: ./cryptolake-java
      dockerfile: docker/Dockerfile.writer
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - cryptolake_internal
      - host_access
    volumes:
      - ./config/config.yaml:/etc/cryptolake/config.yml:ro
      - ${HOST_DATA_DIR:-/data}:${HOST_DATA_DIR:-/data}
    environment:
      - LOG_LEVEL=INFO
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/data}
      - DATABASE__URL=jdbc:postgresql://postgres:5432/cryptolake?user=cryptolake&password=${POSTGRES_PASSWORD:-postgres}
      - MONITORING__WEBHOOK_URL=${WEBHOOK_URL:-}
    command: ["/etc/cryptolake/config.yml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  backfill:
    build:
      context: ./cryptolake-java
      dockerfile: docker/Dockerfile.backfill
    depends_on:
      writer:
        condition: service_healthy
    networks:
      - cryptolake_internal
      - collector_egress
    volumes:
      - ./config/config.yaml:/etc/cryptolake/config.yml:ro
      - ${HOST_DATA_DIR:-/data}:${HOST_DATA_DIR:-/data}
    environment:
      - LOG_LEVEL=INFO
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/data}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  consolidation:
    build:
      context: ./cryptolake-java
      dockerfile: docker/Dockerfile.consolidation
    depends_on:
      writer:
        condition: service_healthy
    networks:
      - cryptolake_internal
    volumes:
      - ./config/config.yaml:/etc/cryptolake/config.yml:ro
      - ${HOST_DATA_DIR:-/data}:${HOST_DATA_DIR:-/data}
    environment:
      - LOG_LEVEL=INFO
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/data}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - cryptolake_internal
      - host_access
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - collector
      - writer
      - alertmanager

  whatsapp-bridge:
    build:
      context: ./infra/whatsapp-bridge
    environment:
      - CALLMEBOT_PHONE=${CALLMEBOT_PHONE:?Set CALLMEBOT_PHONE in .env}
      - CALLMEBOT_APIKEY=${CALLMEBOT_APIKEY:?Set CALLMEBOT_APIKEY in .env}
    networks:
      - cryptolake_internal
      - alertmanager_egress
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9095/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s|\$${WEBHOOK_URL}|$$WEBHOOK_URL|g" /etc/alertmanager/alertmanager.template.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml
    environment:
      - WEBHOOK_URL=http://whatsapp-bridge:9095
    networks:
      - cryptolake_internal
      - alertmanager_egress
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.template.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      whatsapp-bridge:
        condition: service_healthy

volumes:
  postgres_data:
  redpanda_data:
  prometheus_data:

networks:
  cryptolake_internal:
    driver: bridge
    internal: true
  # Host-published services need a non-internal bridge on Docker Desktop or
  # their configured port bindings do not appear on the host.
  host_access:
    driver: bridge
  collector_egress:
    driver: bridge
  alertmanager_egress:
    driver: bridge
  backup_egress:
    driver: bridge
