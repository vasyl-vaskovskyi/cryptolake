name: cryptolake

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=cryptolake
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=cryptolake
    networks:
      - cryptolake_internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptolake -d cryptolake"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.1.2
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:9092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082
      - --set
      - redpanda.auto_create_topics_enabled=true
      - --set
      - redpanda.log_retention_ms=172800000
      - --set
      - redpanda.default_topic_partitions=1
    ports:
      - "127.0.0.1:9092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cryptolake_internal
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - cryptolake_internal
      - collector_egress
    volumes:
      - ./config:/app/config:ro
    environment:
      - CONFIG_PATH=/app/config/config.yaml
      - DATABASE__URL=postgresql://cryptolake:${POSTGRES_PASSWORD:-postgres}@postgres:5432/cryptolake
      - MONITORING__ALERTING__WEBHOOK_URL=${WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; raise SystemExit(0 if urlopen('http://127.0.0.1:8000/health', timeout=5).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  writer:
    build:
      context: .
      dockerfile: Dockerfile.writer
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - cryptolake_internal
    volumes:
      - ./config:/app/config:ro
      - data_volume:/data
    environment:
      - CONFIG_PATH=/app/config/config.yaml
      - DATABASE__URL=postgresql://cryptolake:${POSTGRES_PASSWORD:-postgres}@postgres:5432/cryptolake
      - MONITORING__ALERTING__WEBHOOK_URL=${WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; raise SystemExit(0 if urlopen('http://127.0.0.1:8001/health', timeout=5).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    networks:
      - cryptolake_internal
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - collector
      - writer
      - alertmanager

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "${GRAFANA_BIND:-127.0.0.1}:3000:3000"
    networks:
      - cryptolake_internal
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?Set GF_ADMIN_PASSWORD in .env}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --config.expand-env
    environment:
      - WEBHOOK_URL=${WEBHOOK_URL:?Set WEBHOOK_URL in .env}
    networks:
      - cryptolake_internal
      - alertmanager_egress
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

volumes:
  postgres_data:
  redpanda_data:
  prometheus_data:
  data_volume:

networks:
  cryptolake_internal:
    driver: bridge
    internal: true
  collector_egress:
    driver: bridge
  alertmanager_egress:
    driver: bridge
