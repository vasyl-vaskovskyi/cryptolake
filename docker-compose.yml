name: cryptolake

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=cryptolake
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=cryptolake
    networks:
      - cryptolake_internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptolake -d cryptolake"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.1.2
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:9092
      - --set
      - redpanda.auto_create_topics_enabled=true
      - --set
      - redpanda.log_retention_ms=172800000
      - --set
      - redpanda.default_topic_partitions=1
    ports:
      - "127.0.0.1:9092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cryptolake_internal
      - host_access
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - cryptolake_internal
      - collector_egress
    volumes:
      - ./config:/app/config:ro
    environment:
      - CONFIG_PATH=/app/config/config.yaml
      - DATABASE__URL=postgresql://cryptolake:${POSTGRES_PASSWORD:-postgres}@postgres:5432/cryptolake
      - MONITORING__WEBHOOK_URL=${WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; raise SystemExit(0 if urlopen('http://127.0.0.1:8000/health', timeout=5).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  writer:
    build:
      context: .
      dockerfile: Dockerfile.writer
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - cryptolake_internal
      - host_access
    volumes:
      - ./config:/app/config:ro
      - ${HOST_DATA_DIR:-/data}:${HOST_DATA_DIR:-/data}
    environment:
      - CONFIG_PATH=/app/config/config.yaml
      - DATABASE__URL=postgresql://cryptolake:${POSTGRES_PASSWORD:-postgres}@postgres:5432/cryptolake
      - MONITORING__WEBHOOK_URL=${WEBHOOK_URL:-}
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/data}
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; raise SystemExit(0 if urlopen('http://127.0.0.1:8001/health', timeout=5).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    networks:
      - cryptolake_internal
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - collector
      - writer
      - alertmanager

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "${GRAFANA_BIND:-127.0.0.1}:3000:3000"
    networks:
      - cryptolake_internal
      - host_access
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?Set GF_ADMIN_PASSWORD in .env}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - prometheus

  whatsapp-bridge:
    build:
      context: ./infra/whatsapp-bridge
    environment:
      - CALLMEBOT_PHONE=${CALLMEBOT_PHONE:?Set CALLMEBOT_PHONE in .env}
      - CALLMEBOT_APIKEY=${CALLMEBOT_APIKEY:?Set CALLMEBOT_APIKEY in .env}
    networks:
      - cryptolake_internal
      - alertmanager_egress
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9095/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s|\$${WEBHOOK_URL}|$$WEBHOOK_URL|g" /etc/alertmanager/alertmanager.template.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml
    environment:
      - WEBHOOK_URL=http://whatsapp-bridge:9095
    networks:
      - cryptolake_internal
      - alertmanager_egress
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.template.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      whatsapp-bridge:
        condition: service_healthy

volumes:
  postgres_data:
  redpanda_data:
  prometheus_data:

networks:
  cryptolake_internal:
    driver: bridge
    internal: true
  # Host-published services need a non-internal bridge on Docker Desktop or
  # their configured port bindings do not appear on the host.
  host_access:
    driver: bridge
  collector_egress:
    driver: bridge
  alertmanager_egress:
    driver: bridge
