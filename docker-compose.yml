name: cryptolake

# Java stack. The Python implementation was retired after the Python-to-Java
# port reached DONE state — see git tags `port-{common,writer,collector,cli}-accepted`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=cryptolake
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=cryptolake
    networks:
      - cryptolake_internal
    # Loopback-only publish so cryptolake-verify CLI (audit-state, audit-reconcile)
    # can reach the DB from the host. NOT bound to 0.0.0.0 — local dev only.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptolake -d cryptolake"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.1.2
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:9092
      - --set
      - redpanda.auto_create_topics_enabled=true
      - --set
      - redpanda.log_retention_ms=172800000
      - --set
      - redpanda.default_topic_partitions=1
    ports:
      - "127.0.0.1:9092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cryptolake_internal
      - host_access
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  collector:
    image: cryptolake/collector:${CRYPTOLAKE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.collector
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - cryptolake_internal
      - collector_egress
    volumes:
      - ./config/config.yaml:/etc/cryptolake/config.yml:ro
      - ${HOST_DATA_DIR:-/data}:${HOST_DATA_DIR:-/data}
    environment:
      - LOG_LEVEL=INFO
      - DATABASE__URL=jdbc:postgresql://postgres:5432/cryptolake?user=cryptolake&password=${POSTGRES_PASSWORD:-postgres}
      - MONITORING__WEBHOOK_URL=${WEBHOOK_URL:-}
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/data}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  collector-backup:
    # Shares the cryptolake/collector image with the primary collector — only
    # env (COLLECTOR_ID, TOPIC_PREFIX) differs. NO build: directive: when both
    # services declared build: + the same explicit image tag, BuildKit raced
    # to write the tag in parallel and the second build failed with
    # `image "cryptolake/collector:latest": already exists`. The primary
    # builds the image; we just consume it. pull_policy=never keeps Compose
    # from attempting a registry pull when the image isn't yet built locally
    # (there is no registry — images are loaded via scripts/publish-images.sh
    # in production).
    image: cryptolake/collector:${CRYPTOLAKE_TAG:-latest}
    pull_policy: never
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "127.0.0.1:8004:8000"
    networks:
      - cryptolake_internal
      - backup_egress
    volumes:
      - ./config/config.yaml:/etc/cryptolake/config.yml:ro
      - ${HOST_DATA_DIR:-/data}:${HOST_DATA_DIR:-/data}
    environment:
      - LOG_LEVEL=INFO
      - DATABASE__URL=jdbc:postgresql://postgres:5432/cryptolake?user=cryptolake&password=${POSTGRES_PASSWORD:-postgres}
      - MONITORING__WEBHOOK_URL=${WEBHOOK_URL:-}
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/data}
      - COLLECTOR_ID=binance-collector-backup
      - TOPIC_PREFIX=backup.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  writer:
    image: cryptolake/writer:${CRYPTOLAKE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.writer
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - cryptolake_internal
      - host_access
    volumes:
      - ./config/config.yaml:/etc/cryptolake/config.yml:ro
      - ${HOST_DATA_DIR:-/data}:${HOST_DATA_DIR:-/data}
    environment:
      - LOG_LEVEL=INFO
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/data}
      - DATABASE__URL=jdbc:postgresql://postgres:5432/cryptolake?user=cryptolake&password=${POSTGRES_PASSWORD:-postgres}
      - MONITORING__WEBHOOK_URL=${WEBHOOK_URL:-}
      # Bound JVM heap so any future buffer-growth regression yields a logged
      # OutOfMemoryError BEFORE the kernel SIGKILL fires. -Xms below -Xmx so startup
      # doesn't allocate the whole heap eagerly.
      - JAVA_TOOL_OPTIONS=-Xmx512m -Xms256m
    command: ["/etc/cryptolake/config.yml"]
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  backfill:
    image: cryptolake/backfill:${CRYPTOLAKE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.backfill
    depends_on:
      writer:
        condition: service_healthy
    ports:
      # Publish the HealthServer's /ready and /metrics on a host port for
      # parity with collector / writer / consolidation. Internal port 8000
      # matches infra/prometheus/prometheus.yml's backfill scrape target.
      - "127.0.0.1:8002:8000"
    networks:
      - cryptolake_internal
      - collector_egress
    volumes:
      - ./config/config.yaml:/etc/cryptolake/config.yml:ro
      - ${HOST_DATA_DIR:-/data}:${HOST_DATA_DIR:-/data}
    environment:
      - LOG_LEVEL=INFO
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/data}
    # The backfill CLI requires a subcommand (run-once | scheduler);
    # without one it prints usage and exits, which under restart=unless-stopped
    # produces a tight crash-loop. Run the 6-hourly scheduler in the
    # container, same shape as consolidation.
    command: ["scheduler"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  consolidation:
    image: cryptolake/consolidation:${CRYPTOLAKE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.consolidation
    depends_on:
      writer:
        condition: service_healthy
    ports:
      - "127.0.0.1:8003:8003"
    networks:
      - cryptolake_internal
      - host_access
    volumes:
      - ./config/config.yaml:/etc/cryptolake/config.yml:ro
      - ${HOST_DATA_DIR:-/data}:${HOST_DATA_DIR:-/data}
    environment:
      - LOG_LEVEL=INFO
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/data}
    command: ["scheduler", "--base-dir", "${HOST_DATA_DIR:-/data}"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8003/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - cryptolake_internal
      - host_access
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - collector
      - writer
      - alertmanager

  whatsapp-bridge:
    build:
      context: ./infra/whatsapp-bridge
    environment:
      - CALLMEBOT_PHONE=${CALLMEBOT_PHONE:?Set CALLMEBOT_PHONE in .env}
      - CALLMEBOT_APIKEY=${CALLMEBOT_APIKEY:?Set CALLMEBOT_APIKEY in .env}
    networks:
      - cryptolake_internal
      - alertmanager_egress
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9095/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s|\$${WEBHOOK_URL}|$$WEBHOOK_URL|g" /etc/alertmanager/alertmanager.template.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml
    environment:
      - WEBHOOK_URL=http://whatsapp-bridge:9095
    networks:
      - cryptolake_internal
      - alertmanager_egress
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.template.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      whatsapp-bridge:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.2.0
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - cryptolake_internal
      - host_access
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      # Loopback-only port binding + anonymous Admin = open the browser at
      # http://127.0.0.1:3000 on the host with no login wall. The service
      # itself is unreachable from anywhere except this machine, same
      # security model as Prometheus.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_USERS_DEFAULT_THEME=dark
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/cryptolake-overview.json
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redpanda_data:
  prometheus_data:
  grafana_data:

networks:
  cryptolake_internal:
    driver: bridge
    internal: true
  # Host-published services need a non-internal bridge on Docker Desktop or
  # their configured port bindings do not appear on the host.
  host_access:
    driver: bridge
  collector_egress:
    driver: bridge
  alertmanager_egress:
    driver: bridge
  backup_egress:
    driver: bridge
