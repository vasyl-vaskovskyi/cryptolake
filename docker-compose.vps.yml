# VPS production overrides for medium servers (6-8 GB RAM, 2-4 vCPU).
# Java stack — every service except postgres/redpanda/prometheus is a JVM,
# so cgroup `memory:` limits MUST sit above each service's -Xmx + ~128M overhead
# or the kernel will SIGKILL the container before the JVM can log an OOM.
#
# Total ceiling: ~5.1 GB. Fits a 6 GB VPS comfortably; tight on 4 GB.
# Usage: docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d

services:
  postgres:
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=4MB
      - -c
      - max_connections=50
      - -c
      - effective_cache_size=512MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_completion_target=0.9
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 768M

  redpanda:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.0"

  collector:
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 384M

  collector-backup:
    restart: unless-stopped
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 384M

  # writer keeps the base 768M / -Xmx512m sizing — buffer manager needs the room.
  writer:
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  backfill:
    restart: unless-stopped
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx128m -Xms64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  consolidation:
    restart: unless-stopped
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx128m -Xms64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  prometheus:
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  alertmanager:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

  whatsapp-bridge:
    deploy:
      resources:
        limits:
          memory: 128M
