# config/dev/skeleton.yaml — full §15.b shape pointed at the dev mock stack.
node_id: dev-node

symbols:
  - btcusdt

streams:                 # §7.a — split by subscription form
  per_symbol:
    - trade
    - aggTrade
    - depth@100ms
    - kline_1m
    - ticker
    - bookTicker
    - markPrice@1s
  all_symbol:
    - "!forceOrder@arr"

paths:
  segments: /tmp/cryptopanner/segments
  sealed:   /tmp/cryptopanner/sealed

storage:                 # S3 (MinIO in dev)
  endpoint:          http://localhost:9000
  bucket:            cryptopanner-dev
  access_key:        cryptopanner
  secret_key:        changeme-dev
  region:            us-east-1
  path_style_access: true

collector:
  # Capture target — mock-binance-ws in the dev stack (dual-socket routing per §8.a).
  ws_public_endpoint_url: ws://localhost:9001/public/stream
  ws_market_endpoint_url: ws://localhost:9001/market/stream
  rest_base_url:          http://localhost:9002
  seal_grace_window:      10s
  rest:                   # §7.b — cadences trimmed for the short dev window
    open_interest:
      url_template:  "/fapi/v1/openInterest?symbol={symbol}"
      poll_interval: 5s

dev:                      # non-§15 overlay: standalone-runner knobs
  collector_max_runtime_s: 30
