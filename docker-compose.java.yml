# End-to-end Java-stack compose for capture-refresh + re-verify validation.
#
# Reuses postgres + redpanda from the base docker-compose.yml; replaces only
# collector and writer services with Java implementations. Run as:
#
#   export HOST_DATA_DIR=/tmp/cryptolake-java-data
#   docker compose -f docker-compose.yml -f docker-compose.java.yml \
#       up -d postgres redpanda writer collector
#
# After a capture window, tear down and run Python `cryptolake verify` against
# $HOST_DATA_DIR to confirm Java-produced archives pass the same byte-identity
# verification as Python-produced ones.

services:
  collector:
    image: cryptolake-java-collector:test
    build:
      context: ./cryptolake-java
      dockerfile: docker/Dockerfile.collector
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - cryptolake_internal
      - collector_egress
    volumes:
      - ./config/config.yaml:/etc/cryptolake/config.yml:ro
    environment:
      - LOG_LEVEL=INFO
    # Java collector reads config from /etc/cryptolake/config.yml by default.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: "no"

  writer:
    image: cryptolake-java-writer:test
    build:
      context: ./cryptolake-java
      dockerfile: docker/Dockerfile.writer
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # No host port mapping — this verification doesn't scrape writer metrics.
    networks:
      - cryptolake_internal
      - host_access
    volumes:
      - ./config/config.yaml:/etc/cryptolake/config.yml:ro
      - ${HOST_DATA_DIR:-/data}:${HOST_DATA_DIR:-/data}
    environment:
      - LOG_LEVEL=INFO
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/data}
      # Java JDBC needs the jdbc: prefix + user/password in URL params.
      # YamlConfigLoader's DATABASE__ prefix overrides config.yaml's database.url.
      - DATABASE__URL=jdbc:postgresql://postgres:5432/cryptolake?user=cryptolake&password=${POSTGRES_PASSWORD:-postgres}
    command: ["/etc/cryptolake/config.yml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: "no"
